name: Sync Copilot model data

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download latest model data
        run: |
          set -euo pipefail
          mkdir -p .github
          curl --fail --silent --show-error \
            -H "x-api-key: ${{ secrets.ARTIFICIAL_ANALYSIS_KEY }}" \
            https://artificialanalysis.ai/api/v2/data/llms/models \
            > .github/copilot.json

      - name: Commit and push changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/copilot.json
          git diff --cached --quiet && exit 0
          git commit -m "Update copilot model data"
          git push origin HEAD:main
